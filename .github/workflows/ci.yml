name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan so new advisories show up even without a push.
    - cron: '17 13 * * 1'

jobs:
  audit:
    name: npm audit (production deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      # F-19: fail on any HIGH or CRITICAL advisory in production deps.
      # Moderates / lows / dev-only chains are tracked, not blocking.
      - run: npm audit --omit=dev --audit-level=high

  typecheck:
    name: tsc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
